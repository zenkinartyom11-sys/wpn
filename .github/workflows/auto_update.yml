name: Auto Update VLESS Config

on:
  push:
    branches:
      - main       
  schedule:
    - cron: '7,22,37,52 * * * *' 
  workflow_dispatch: 

jobs:
  run-parser:
    name: Run VLESS Parser
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: 1. Клонируем ваш репозиторий
        uses: actions/checkout@v4

      - name: 2. Включаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Устанавливаем библиотеку requests
        run: pip install requests

      - name: 3.5 Скачиваем и распаковываем ядро Xray через cURL
        run: |
          curl -L -o Xray-linux-64.zip https://github.com
          unzip -o Xray-linux-64.zip xray
          chmod +x xray

      - name: 4. Запускаем скрипт
        run: python checker.py

      - name: 5. Сохраняем изменения и пушим в репозиторий
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "subscription.txt"
          git commit -m "🤖 Авто-обновление серверов VLESS в subscription.txt" || echo "Изменений нет"
          git push
