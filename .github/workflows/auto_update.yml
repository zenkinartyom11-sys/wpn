name: Auto Update VLESS Config

on:
  push:
    branches:
      - main       # Запуск сразу после сохранения файла
  schedule:
    - cron: '7,22,37,52 * * * *' # Запуск каждые 15 минут в разгруженные минуты серверов
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  run-parser:
    name: Run VLESS Parser
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем права на запись файлов в репозиторий
    steps:
      - name: 1. Клонируем ваш репозиторий
        uses: actions/checkout@v4

      - name: 2. Включаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Устанавливаем библиотеку requests
        run: pip install requests

      - name: 4. Запускаем скрипт (с авто-переключателем на резервный источник)
        run: |
          python checker.py || (
            echo "⚠️ Основной источник недоступен. Переключаемся на резервный..." && \
            sed -i "s|https://githubusercontent.com|https://githubusercontent.com|g" checker.py && \
            python checker.py
          )

      - name: 5. Сохраняем изменения и пушим в репозиторий
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "subscription.txt"
          git commit -m "🤖 Авто-обновление серверов VLESS в subscription.txt" || echo "Изменений нет"
          git push
